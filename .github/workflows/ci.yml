name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + migracje)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      SECRET_KEY: ci-secret-key-dostatecznie-dlugi-do-testow-1234567890
      RCP_INGEST_TOKEN: ci-rcp-token-1234567890
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/tests/requirements-test.txt
      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt
      - name: Testy (pytest)
        run: pytest -q
      - name: Smoke migracji (alembic upgrade head na czystej bazie)
        env:
          DATABASE_URL: sqlite:///ci_smoke.db
        run: |
          alembic upgrade head
          rm -f ci_smoke.db

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalacja zależności
        run: npm ci
      - name: Build produkcyjny
        run: npm run build
