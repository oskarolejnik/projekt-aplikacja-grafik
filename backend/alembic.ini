# Konfiguracja Alembic dla „Grafik Pracy".
# URL bazy NIE jest tu wpisany na sztywno — env.py czyta go z DATABASE_URL (jak aplikacja),
# dzięki czemu migracje działają na tej samej bazie co backend (SQLite dev / PostgreSQL prod
# / osobna baza per klient w modelu instance-per-tenant).

[alembic]
script_location = migrations
prepend_sys_path = .
# Format nazw plików rewizji: data + slug (czytelna historia).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
