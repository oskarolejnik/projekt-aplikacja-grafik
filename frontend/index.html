<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>System Zarządzania Grafikiem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 text-slate-800 font-sans h-screen overflow-hidden flex">

  <aside class="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 shadow-sm z-20">
    <div class="h-20 flex items-center px-8 border-b border-slate-100">
      <div class="w-8 h-8 bg-blue-600 rounded-lg mr-3 shadow-sm flex items-center justify-center text-white font-bold text-xl">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </div>
      <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Grafik<span class="text-blue-600">Pro</span></h1>
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1.5">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider px-4 mb-3 mt-2">Zarządzanie</div>
      
      <button data-tab="tab-pracownicy" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-600 hover:bg-slate-50 hover:text-blue-600 active">
        <svg class="w-5 h-5 mr-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg> Pracownicy
      </button>
      
      <button data-tab="tab-stanowiska" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-600 hover:bg-slate-50 hover:text-blue-600">
        <svg class="w-5 h-5 mr-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg> Stanowiska
      </button>
      
      <button data-tab="tab-wymagania" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-600 hover:bg-slate-50 hover:text-blue-600">
        <svg class="w-5 h-5 mr-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg> Wymagania (Plan)
      </button>

      <div class="text-xs font-bold text-slate-400 uppercase tracking-wider px-4 mb-3 mt-8">Operacje</div>

      <button data-tab="tab-dyspozycje" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-600 hover:bg-slate-50 hover:text-blue-600">
        <svg class="w-5 h-5 mr-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> Dyspozycje (CSV)
      </button>

      <button data-tab="tab-grafik" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-600 hover:bg-slate-50 hover:text-blue-600">
        <svg class="w-5 h-5 mr-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> Interaktywny Grafik
      </button>

      <button data-tab="tab-eksport" class="w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200 text-slate-600 hover:bg-slate-50 hover:text-blue-600">
        <svg class="w-5 h-5 mr-3 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> Eksport do Excela
      </button>
    </nav>

    <div class="p-4 border-t border-slate-100">
      <div class="bg-slate-50 rounded-xl p-4 flex items-center border border-slate-200">
        <div class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></div>
        <span class="text-xs font-medium text-slate-600">Wersja Premium</span>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden relative">
    <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10 shadow-sm">
      <h2 class="text-xl font-bold text-slate-800" id="top-header-title">Zarządzanie Pracownikami</h2>
      <div class="flex items-center gap-4 text-sm font-medium text-slate-500">Konto Administratora</div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50/50 p-8">
      <div class="max-w-7xl mx-auto w-full">
        <section id="tab-pracownicy" class="active"><div id="pracownicy-content"></div></section>
        <section id="tab-stanowiska"><div id="stanowiska-content"></div></section>
        <section id="tab-wymagania"><div id="wymagania-content"></div></section>
        <section id="tab-grafik"><div id="grafik-content"></div></section>
        
        <section id="tab-dyspozycje">
          <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8 max-w-3xl">
            <h2 class="text-2xl font-bold text-slate-900 mb-6">Wgraj dyspozycje pracowników</h2>
            <div class="bg-blue-50 text-blue-800 p-4 rounded-xl mb-6 text-sm font-medium border border-blue-100">
              Upewnij się, że plik CSV ma odpowiednie nagłówki. W razie konfliktów system poinformuje Cię o błędach.
            </div>
            <div class="flex flex-col sm:flex-row gap-4 items-center">
              <input type="file" id="csv-file" accept=".csv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer border border-slate-200 rounded-xl bg-white p-1">
              <button id="csv-upload-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-sm transition-all whitespace-nowrap">Importuj CSV</button>
            </div>
            <div id="import-preview" class="mt-8"></div>
          </div>
        </section>
        
        <section id="tab-eksport">
          <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-8 max-w-2xl">
            <h2 class="text-2xl font-bold text-slate-900 mb-6">Generuj raport (Tabela przestawna)</h2>
            <div class="grid grid-cols-2 gap-6 mb-6">
              <label class="flex flex-col gap-2">
                <span class="text-sm font-semibold text-slate-700">Początek zakresu:</span>
                <input type="date" id="eksport-start" class="border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-slate-800 bg-slate-50 focus:bg-white transition-colors">
              </label>
              <label class="flex flex-col gap-2">
                <span class="text-sm font-semibold text-slate-700">Koniec zakresu:</span>
                <input type="date" id="eksport-end" class="border border-slate-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none text-slate-800 bg-slate-50 focus:bg-white transition-colors">
              </label>
            </div>
            <button id="eksport-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-sm transition-all text-lg">
              Pobierz plik dla Excela (.csv)
            </button>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
