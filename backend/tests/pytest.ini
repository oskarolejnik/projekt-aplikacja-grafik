[pytest]
addopts = -ra -q
markers =
    gap: dokumentuje brakujące ograniczenie biznesowe/prawne (test oczekiwań — xfail dopóki nie zaimplementowane)
    e2e: pełny przepływ przez API (HTTP, uwierzytelnianie, wiele endpointów)
    algorithm: testy logiki algorytmu auto-assign
filterwarnings =
    ignore::DeprecationWarning
