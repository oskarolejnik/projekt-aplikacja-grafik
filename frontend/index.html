<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Grafik Pracy</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8 overflow-y-scroll min-h-screen">

  <div class="max-w-7xl w-full mx-auto flex flex-col md:flex-row gap-8 items-start">
    
    <nav class="w-full md:w-64 flex flex-col gap-2 bg-white p-4 rounded-xl shadow-sm border border-slate-200 shrink-0 sticky top-8">
      <button data-tab="tab-pracownicy" class="px-5 py-3 text-left rounded-lg font-medium transition-all duration-300 text-slate-600 hover:bg-blue-50 hover:text-blue-600 active">Pracownicy</button>
      <button data-tab="tab-stanowiska" class="px-5 py-3 text-left rounded-lg font-medium transition-all duration-300 text-slate-600 hover:bg-blue-50 hover:text-blue-600">Stanowiska</button>
      <button data-tab="tab-wymagania" class="px-5 py-3 text-left rounded-lg font-medium transition-all duration-300 text-slate-600 hover:bg-blue-50 hover:text-blue-600">Wymagania</button>
      <button data-tab="tab-dyspozycje" class="px-5 py-3 text-left rounded-lg font-medium transition-all duration-300 text-slate-600 hover:bg-blue-50 hover:text-blue-600">Dyspozycje</button>
      <button data-tab="tab-grafik" class="px-5 py-3 text-left rounded-lg font-medium transition-all duration-300 text-slate-600 hover:bg-blue-50 hover:text-blue-600">Grafik</button>
      <button data-tab="tab-eksport" class="px-5 py-3 text-left rounded-lg font-medium transition-all duration-300 text-slate-600 hover:bg-blue-50 hover:text-blue-600">Eksport</button>
    </nav>

    <main class="flex-1 min-w-0 w-full">

      <section id="tab-pracownicy" class="active">
        <div id="pracownicy-content"></div>
      </section>

      <section id="tab-stanowiska">
        <div id="stanowiska-content"></div>
      </section>

      <section id="tab-wymagania">
        <div id="wymagania-content"></div>
      </section>

      <section id="tab-dyspozycje">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Import dyspozycji z CSV</h2>
        
        <fieldset class="border border-slate-200 rounded-xl p-6 bg-white shadow-sm mb-6">
          <legend class="text-lg font-semibold text-slate-700 px-3">Plik CSV</legend>
          
          <div class="text-slate-600 space-y-2 mb-6 bg-slate-50 p-4 rounded-lg border border-slate-100">
            <p>Oczekiwane kolumny: <code class="bg-white text-pink-600 px-2 py-0.5 rounded border border-slate-200 font-mono text-sm">pracownik, data, dostępność, od, do</code></p>
            <p>Formaty dat: <code class="bg-white px-2 py-0.5 rounded border border-slate-200 font-mono text-sm">YYYY-MM-DD</code> lub <code class="bg-white px-2 py-0.5 rounded border border-slate-200 font-mono text-sm">DD.MM.YYYY</code></p>
            <p>Dostępność: <span class="font-medium text-slate-700">1/0, true/false, tak/nie</span></p>
          </div>
          
          <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">
            <input type="file" id="csv-file" accept=".csv" 
              class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-6 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 hover:file:cursor-pointer transition-colors">
            <button id="csv-upload-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors shadow-sm whitespace-nowrap">
              Importuj
            </button>
          </div>
        </fieldset>

        <div id="import-preview" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 min-h-[100px]"></div>
      </section>

      <section id="tab-grafik">
        <div id="grafik-content"></div>
      </section>

      <section id="tab-eksport">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Eksport grafiku do CSV</h2>
        <fieldset class="border border-slate-200 rounded-xl p-6 bg-white shadow-sm">
          <legend class="text-lg font-semibold text-slate-700 px-3">Zakres dat</legend>
          
          <div class="flex flex-wrap items-end gap-6 mt-2">
            <label class="flex flex-col gap-2">
              <span class="text-sm font-medium text-slate-600">Od dnia:</span>
              <input type="date" id="eksport-start" 
                     class="border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-slate-700 transition-shadow">
            </label>
            
            <label class="flex flex-col gap-2">
              <span class="text-sm font-medium text-slate-600">Do dnia:</span>
              <input type="date" id="eksport-end" 
                     class="border border-slate-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-slate-700 transition-shadow">
            </label>
            
            <button id="eksport-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-6 rounded-lg transition-colors shadow-sm flex items-center gap-2">
              Pobierz CSV
            </button>
          </div>
        </fieldset>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
