# Produkcyjny stack jednej instancji: aplikacja (FastAPI + zbudowany front) + PostgreSQL + Caddy.
# Konfigurację podaj w pliku .env obok (zob. .env.prod.example). Uruchom:
#   docker compose -f docker-compose.prod.yml up -d --build
# Pierwszy administrator (po starcie):
#   docker compose -f docker-compose.prod.yml exec app python create_admin.py
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grafik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ustaw POSTGRES_PASSWORD w pliku .env}
      POSTGRES_DB: ${POSTGRES_DB:-grafik}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grafik}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-grafik}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-grafik}
      SECRET_KEY: ${SECRET_KEY:?ustaw SECRET_KEY w pliku .env}
      # Wymagany: szyfrowanie PII gości at-rest. Brak = odmowa startu (RODO art. 32).
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ustaw ENCRYPTION_KEY w pliku .env}
      # Zaufane proxy dla X-Forwarded-For (rate-limity liczą realne IP klienta). App jest
      # osiągalna wyłącznie przez Caddy w prywatnej sieci compose → '*' jest tu bezpieczne.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      RCP_INGEST_TOKEN: ${RCP_INGEST_TOKEN:-}
      TOKEN_TTL_MINUTES: ${TOKEN_TTL_MINUTES:-720}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      REZERWACJE_READ_MODE: ${REZERWACJE_READ_MODE:-legacy}
      REZERWACJE_CUTOVER_DATE: ${REZERWACJE_CUTOVER_DATE:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_SA_JSON: ${GOOGLE_SA_JSON:-/run/secrets/lokalo/google_sa.json}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_TOKEN: ${SMS_API_TOKEN:-}
      SMS_SENDER: ${SMS_SENDER:-}
      SMS_SUPPORTS_IDEMPOTENCY: ${SMS_SUPPORTS_IDEMPOTENCY:-false}
      SMS_IDEMPOTENCY_HEADER: ${SMS_IDEMPOTENCY_HEADER:-Idempotency-Key}
      RESERVATION_DELIVERY_INTERVAL_SECONDS: ${RESERVATION_DELIVERY_INTERVAL_SECONDS:-5}
    volumes:
      # Opcjonalne: dla legacy/shadow umieść konto serwisowe w ./secrets/google_sa.json.
      - ./secrets:/run/secrets/lokalo:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMENA: ${DOMENA:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  # Kopia zapasowa na żądanie (profil "backup" — nie startuje z całym stackiem):
  #   docker compose -f docker-compose.prod.yml --profile backup run --rm backup
  # Zaplanuj przez cron hosta, np. codziennie o 3:00.
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grafik}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-grafik}
      BACKUP_DIR: /backups
      RETENCJA_DNI: ${RETENCJA_DNI:-14}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ./backups:/backups
    entrypoint: ["sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
