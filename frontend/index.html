<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: rysujemy pod notch/wcięcia (z safe-area-inset w CSS).
         maximum-scale=1 + user-scalable=no: w trybie PWA (standalone) blokuje zoom/pinch — apka „sztywna". -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1C1C1E" />
    <!-- Apka jest CIEMNA — deklarujemy to przeglądarce. Zapobiega „force dark" Androida/Samsunga,
         który podwójnie inwertuje już-ciemny UI i rozjeżdża kolory (parsowane przed CSS). -->
    <meta name="color-scheme" content="dark" />
    <link rel="apple-touch-icon" href="/pwa-rajcula-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Rajcula" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Rajcula</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
